name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./... -count=1 -race
      - run: go vet ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=1 > benchmarks.txt

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log --oneline ${PREV_TAG}..${TAG})
          fi

          cat > release-notes.md << 'EOF'
          ## What's in this release

          Stratified Merkle tree library for Go. Zero dependencies.

          **Features:**
          - 2-level Forest (root -> groups -> leaves)
          - 3-level MultiLevel (root -> groups -> subgroups -> leaves)
          - Inclusion proofs (offline-verifiable, ~660 bytes)
          - Absence proofs (prove something does NOT exist)
          - O(groups) diff (detect changes without scanning leaves)
          - Scoped SubRoot queries (cache keys for group subsets)
          - Configurable domain prefix (backward compat)

          **Performance (Apple M4 Pro):**
          - Verify: 867ns (zero allocations)
          - Prove: 9-16us
          - Diff 100 groups: 2.6us
          - Build 10K leaves: 1.2ms

          **Install:**
          ```
          go get github.com/blackwell-systems/merkle-forest@latest
          ```

          ---

          ### Changes
          EOF
          echo "$COMMITS" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Benchmarks" >> release-notes.md
          echo '```' >> release-notes.md
          cat benchmarks.txt >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
